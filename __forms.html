<!-- Static skeleton for Netlify Forms build-time detection -->
<html>
  <body>
    <form name="custom-quote" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="custom-quote" />
      <input name="firstName" />
      <input name="lastName" />
      <input name="businessName" />
      <input name="email" type="email" />
      <textarea name="requirements"></textarea>
      <input name="bot-field" />
    </form>
  </body>
</html>
